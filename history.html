<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History - Kanifnath Construction</title>

<style>
body{
margin:0;
font-family:Segoe UI, Arial;
background:linear-gradient(135deg,#eef2f7,#ffffff);
}

/* ===== HEADER ===== */
.header{
background:linear-gradient(90deg,#7a0c0c,#a30000);
color:#fff;
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
flex-wrap:wrap;
}

.logo-area{
display:flex;
align-items:center;
gap:12px;
}

.logo-area img{ width:45px; }

.logo-area h2{
margin:0;
font-size:20px;
}

.subtitle{
font-size:12px;
opacity:0.85;
}

.header button{
background:#fff;
color:#7a0c0c;
border:none;
padding:6px 16px;
border-radius:20px;
cursor:pointer;
font-weight:600;
}

.header button:hover{
background:#f3f3f3;
}

/* ===== CONTAINER ===== */
.container{
padding:40px;
max-width:1100px;
margin:auto;
}

/* ===== TOP BAR ===== */
.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:15px;
}

.search-box input,
.filter select{
padding:8px 14px;
border:1px solid #ccc;
border-radius:20px;
}

.revenue-card{
background:#fff;
padding:15px 20px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
font-weight:600;
color:#7a0c0c;
}

/* ===== TABLE ===== */
.table-wrapper{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

th{
background:#7a0c0c;
color:#fff;
padding:12px;
font-size:13px;
position:sticky;
top:0;
}

td{
padding:12px;
border-bottom:1px solid #eee;
text-align:center;
font-size:13px;
}

tr:hover{
background:#f9f9f9;
}

.action-btn{
background:#7a0c0c;
color:#fff;
border:none;
padding:6px 14px;
cursor:pointer;
border-radius:20px;
font-size:12px;
}

.action-btn:hover{
background:#4d0606;
}

.empty{
text-align:center;
padding:25px;
color:#888;
font-style:italic;
}

/* ===== FOOTER ===== */
.footer{
margin-top:50px;
text-align:center;
padding:25px;
font-size:13px;
color:#666;
border-top:1px solid #ddd;
background:#fafafa;
}

.footer strong{
color:#7a0c0c;
}

@media(max-width:768px){
.container{ padding:20px; }
}
</style>
</head>

<body>

<div class="header">
<div class="logo-area">
<img src="LOGOKF.jpg">
<div>
<h2>KANIFNATH CONSTRUCTION</h2>
<div class="subtitle">Document History & Revenue Overview</div>
</div>
</div>

<button onclick="location.href='index.html'">← Dashboard</button>
</div>

<div class="container">

<div class="top-bar">

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search Number or Client..." oninput="loadHistory()">
</div>

<div class="filter">
<select id="typeFilter" onchange="loadHistory()">
<option value="All">All</option>
<option value="Invoice">Invoice</option>
<option value="Quotation">Quotation</option>
</select>
</div>

<div class="revenue-card">
Total Revenue: ₹ <span id="totalRevenue">0.00</span>
</div>

</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th>Type</th>
<th>Number</th>
<th>Date</th>
<th>Client</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>
<tbody id="historyTable"></tbody>
</table>
</div>

</div>

<div class="footer">
© <span id="year"></span> <strong>Kanifnath Construction</strong> • All Rights Reserved
</div>

<script>

document.getElementById("year").innerText=new Date().getFullYear();

function loadHistory(){

let data = JSON.parse(localStorage.getItem("kcDocs")) || [];
let table = document.getElementById("historyTable");
let search = document.getElementById("searchInput").value.toLowerCase();
let filter = document.getElementById("typeFilter").value;

table.innerHTML="";
let totalRevenue=0;
let count=0;

data.forEach((doc,index)=>{

let number = doc.number ? doc.number.toLowerCase() : "";
let client = doc.client ? doc.client.toLowerCase() : "";

let matchSearch =
number.includes(search) || client.includes(search);

let matchType = filter==="All" || doc.type===filter;

if(matchSearch && matchType){

let amount = parseFloat(doc.amount) || 0;

let row = table.insertRow();

row.innerHTML=`
<td>${doc.type || "-"}</td>
<td>${doc.number || "-"}</td>
<td>${doc.date || "-"}</td>
<td>${doc.client || "-"}</td>
<td>₹ ${amount.toFixed(2)}</td>
<td>
<button class="action-btn" onclick="deleteDoc(${index})">Delete</button>
</td>
`;

if(doc.type==="Invoice"){
totalRevenue += amount;
}

count++;
}

});

if(count===0){
table.innerHTML=`<tr><td colspan="6" class="empty">No documents found</td></tr>`;
}

document.getElementById("totalRevenue").innerText=totalRevenue.toFixed(2);
}

function deleteDoc(index){
if(!confirm("Are you sure you want to delete this document?")) return;

let data = JSON.parse(localStorage.getItem("kcDocs")) || [];
data.splice(index,1);
localStorage.setItem("kcDocs",JSON.stringify(data));
loadHistory();
}

loadHistory();

</script>

</body>
</html>
