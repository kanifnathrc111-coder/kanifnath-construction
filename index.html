
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kanifnath Construction Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
if(localStorage.getItem("kcLogin")!=="true"){
window.location.href="login.html";
}
</script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f6fb;
}

/* HEADER */

.header{
background:#7a0c0c;
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
font-size:18px;
}

.logo-img{
width:40px;
height:40px;
border-radius:8px;
object-fit:cover;
box-shadow:0 0 8px rgba(0,0,0,0.3);
}

.nav span{
margin-left:15px;
cursor:pointer;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:25px;
}

.welcome{
font-size:24px;
margin-bottom:20px;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:25px;
}

.stat{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
text-align:center;
}

.stat h4{
margin:0;
color:#777;
font-size:14px;
}

.stat p{
font-size:24px;
font-weight:bold;
color:#7a0c0c;
}

/* ACTIONS */

.actions{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:25px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
text-align:center;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* CHART */

.chart-box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
margin-bottom:25px;
}

/* RECENT */

.recent{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.recent-item{
display:flex;
justify-content:space-between;
border-bottom:1px solid #eee;
padding:8px 0;
}

/* FOOTER */

.footer{
text-align:center;
margin-top:30px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">

<img src="LOGOKF.jpg" class="logo-img">

<span>KANIFNATH CONSTRUCTION</span>

</div>

<div class="nav">

<span onclick="downloadBackup()">💾 Backup</span>

<span onclick="document.getElementById('restore').click()">♻ Restore</span>

<span onclick="location.href='history.html'">📊 History</span>

<span onclick="logout()">🚪 Logout</span>

</div>

</div>

<input type="file" id="restore" style="display:none" onchange="restoreBackup(event)">

<div class="container">

<div class="welcome">
👋 Welcome Rahul
</div>

<!-- STATS -->

<div class="stats">

<div class="stat">
<h4>💰 Revenue</h4>
<p id="revenue">0</p>
</div>

<div class="stat">
<h4>📉 Expense</h4>
<p id="expense">0</p>
</div>

<div class="stat">
<h4>📈 Profit</h4>
<p id="profit">0</p>
</div>

<div class="stat">
<h4>🧾 Invoices</h4>
<p id="invoiceCount">0</p>
</div>

</div>

<!-- ACTIONS -->

<div class="actions">

<div class="card" onclick="location.href='Billing Calculator Page.html'">
🧾 Create Invoice
</div>

<div class="card" onclick="location.href='quotation.html'">
📄 Create Quotation
</div>

<div class="card" onclick="location.href='site-ledger.html'">
💰 Site Ledger
</div>

</div>

<!-- CHART -->

<div class="chart-box">

<h3>📊 Revenue Overview</h3>

<canvas id="chart"></canvas>

</div>

<!-- RECENT -->

<div class="recent">

<h3>📜 Recent Activity</h3>

<div id="recentList"></div>

</div>

<div class="footer">

© <span id="year"></span> Kanifnath Construction

</div>

</div>

<script>

/* LOGOUT */

function logout(){
localStorage.removeItem("kcLogin");
location.href="login.html";
}

/* BACKUP */

function downloadBackup(){

let data=localStorage.getItem("kcDocs");

if(!data){
alert("No Data Found");
return;
}

let blob=new Blob([data],{type:"application/json"});
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="backup.json";
a.click();

}

/* RESTORE */

function restoreBackup(e){

let file=e.target.files[0];
let reader=new FileReader();

reader.onload=function(event){

localStorage.setItem("kcDocs",event.target.result);

alert("Backup Restored");

location.reload();

};

reader.readAsText(file);

}

/* DASHBOARD DATA */

function loadDashboard(){

let data=JSON.parse(localStorage.getItem("kcDocs"))||[];

let revenue=0;
let expense=0;
let invoices=0;

let recent=[];

data.forEach(d=>{

if(d.type==="Invoice"){
revenue+=parseFloat(d.amount)||0;
invoices++;
}

if(d.type==="Expense"){
expense+=parseFloat(d.amount)||0;
}

recent.push(d);

});

let profit=revenue-expense;

document.getElementById("revenue").innerText=revenue.toFixed(2);
document.getElementById("expense").innerText=expense.toFixed(2);
document.getElementById("profit").innerText=profit.toFixed(2);
document.getElementById("invoiceCount").innerText=invoices;

/* CHART */

new Chart(document.getElementById("chart"),{

type:"bar",

data:{

labels:["Revenue","Expense","Profit"],

datasets:[{

data:[revenue,expense,profit],

backgroundColor:["#7a0c0c","#ff4d4d","#2e7d32"]

}]

}

});

/* RECENT */

let r=document.getElementById("recentList");

recent.slice(-5).reverse().forEach(d=>{

r.innerHTML+=`

<div class="recent-item">

<span>${d.number||d.type}</span>

<span>₹ ${parseFloat(d.amount||0).toFixed(2)}</span>

</div>

`;

});

document.getElementById("year").innerText=new Date().getFullYear();

}

loadDashboard();

</script>

</body>
</html>
